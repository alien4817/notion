name: Drug Shortage Monitor

on:
  schedule:
    # Taiwan 08:00 = UTC 00:00; Taiwan 16:00 = UTC 08:00.
    - cron: "0 0,8 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: drug-shortage-monitor

    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      FDA_DSMS_URL: ${{ secrets.FDA_DSMS_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: drug-shortage-monitor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run monitor
        run: npm run monitor
